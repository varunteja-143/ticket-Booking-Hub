<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Searching Animation</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .search-container {
            font-size: 50px;
            animation: search 4s ease-in-out infinite;
        }
        @keyframes search {
            0% { transform: translateX(0); }
            50% { transform: translateX(20px); }
            100% { transform: translateX(0); }
        }
    </style>
    <script>
        setTimeout(function() {
            window.location.href = 'BusResults.html'; // Change to your desired page
        }, 4000);
    </script>
</head>
<body>
    <div class="search-container">🔍</div>
</body>
</html>
